<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Shooter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        #ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 100;
        }

        .ui-panel {
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 25px;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
        }

        .score {
            font-size: 2em;
            font-weight: bold;
        }

        .health-bar {
            width: 200px;
            height: 20px;
            background: rgba(255, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 0, 0, 0.5);
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff4444);
            transition: width 0.3s;
            box-shadow: 0 0 20px #ff0000;
        }

        .health-label {
            font-size: 0.8em;
            margin-bottom: 5px;
            color: #ff4444;
        }

        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            pointer-events: none;
            z-index: 100;
        }

        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(0, 255, 255, 0.8);
            box-shadow: 0 0 10px #0ff;
        }

        #crosshair::before {
            width: 2px;
            height: 100%;
            left: 50%;
            transform: translateX(-50%);
        }

        #crosshair::after {
            width: 100%;
            height: 2px;
            top: 50%;
            transform: translateY(-50%);
        }

        #game-over {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 200;
        }

        #game-over h1 {
            font-size: 4em;
            color: #ff0044;
            text-shadow: 0 0 30px #ff0044;
            margin-bottom: 20px;
        }

        #game-over .final-score {
            font-size: 2em;
            color: #0ff;
            margin-bottom: 40px;
        }

        #game-over button {
            padding: 15px 50px;
            font-size: 1.5em;
            background: transparent;
            border: 2px solid #0ff;
            color: #0ff;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
        }

        #game-over button:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 30px #0ff;
        }

        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 200;
        }

        #start-screen h1 {
            font-size: 4em;
            color: #0ff;
            text-shadow: 0 0 30px #0ff;
            margin-bottom: 10px;
        }

        #start-screen .subtitle {
            color: #888;
            margin-bottom: 40px;
        }

        #start-screen .controls {
            color: #666;
            margin-bottom: 40px;
            text-align: center;
            line-height: 2;
        }

        #start-screen .controls span {
            color: #0ff;
        }

        #start-screen button {
            padding: 20px 60px;
            font-size: 1.5em;
            background: transparent;
            border: 2px solid #0ff;
            color: #0ff;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
        }

        #start-screen button:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 30px #0ff;
        }

        #minimap {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 150px;
            height: 150px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 50%;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="start-screen">
        <h1>SPACE SHOOTER</h1>
        <p class="subtitle">Survive the asteroid field</p>
        <div class="controls">
            <span>WASD</span> - Move<br>
            <span>MOUSE</span> - Aim<br>
            <span>CLICK</span> - Shoot<br>
            <span>SHIFT</span> - Boost
        </div>
        <button id="start-btn">START GAME</button>
    </div>

    <div id="ui">
        <div class="ui-panel">
            <div class="score">SCORE: <span id="score">0</span></div>
        </div>
        <div class="ui-panel">
            <div class="health-label">HULL INTEGRITY</div>
            <div class="health-bar">
                <div class="health-fill" id="health-fill"></div>
            </div>
        </div>
    </div>

    <div id="crosshair"></div>

    <div id="game-over">
        <h1>GAME OVER</h1>
        <div class="final-score">Final Score: <span id="final-score">0</span></div>
        <button id="restart-btn">PLAY AGAIN</button>
    </div>

    <canvas id="minimap"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Game state
        let scene, camera, renderer;
        let player, playerVelocity;
        let asteroids = [];
        let lasers = [];
        let particles = [];
        let stars = [];
        let score = 0;
        let health = 100;
        let gameStarted = false;
        let gameOver = false;

        // Controls
        const keys = {};
        let mouseX = 0, mouseY = 0;
        let shooting = false;
        let lastShot = 0;
        const shootCooldown = 150;

        // Initialize Three.js
        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000011, 0.0008);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
            camera.position.z = 0;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.insertBefore(renderer.domElement, document.body.firstChild);

            // Create starfield
            createStars();

            // Create player ship
            createPlayer();

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x333333);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(1, 1, 1);
            scene.add(directionalLight);

            const pointLight = new THREE.PointLight(0x00ffff, 1, 100);
            pointLight.position.set(0, 0, 10);
            scene.add(pointLight);

            // Event listeners
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', (e) => keys[e.code] = true);
            document.addEventListener('keyup', (e) => keys[e.code] = false);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mousedown', () => shooting = true);
            document.addEventListener('mouseup', () => shooting = false);
            document.addEventListener('click', onClick);

            // Start button
            document.getElementById('start-btn').addEventListener('click', startGame);
            document.getElementById('restart-btn').addEventListener('click', restartGame);
        }

        function createStars() {
            const starGeometry = new THREE.BufferGeometry();
            const starCount = 5000;
            const positions = new Float32Array(starCount * 3);
            const colors = new Float32Array(starCount * 3);

            for (let i = 0; i < starCount; i++) {
                const i3 = i * 3;
                positions[i3] = (Math.random() - 0.5) * 4000;
                positions[i3 + 1] = (Math.random() - 0.5) * 4000;
                positions[i3 + 2] = (Math.random() - 0.5) * 4000;

                const color = new THREE.Color();
                color.setHSL(Math.random() * 0.2 + 0.5, 0.5, Math.random() * 0.5 + 0.5);
                colors[i3] = color.r;
                colors[i3 + 1] = color.g;
                colors[i3 + 2] = color.b;
            }

            starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            starGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const starMaterial = new THREE.PointsMaterial({
                size: 2,
                vertexColors: true,
                transparent: true,
                opacity: 0.8
            });

            const starField = new THREE.Points(starGeometry, starMaterial);
            scene.add(starField);
            stars.push(starField);
        }

        function createPlayer() {
            // Ship body
            const shipGroup = new THREE.Group();

            // Main hull
            const hullGeometry = new THREE.ConeGeometry(0.5, 2, 8);
            const hullMaterial = new THREE.MeshPhongMaterial({
                color: 0x00aaff,
                emissive: 0x003366,
                shininess: 100
            });
            const hull = new THREE.Mesh(hullGeometry, hullMaterial);
            hull.rotation.x = Math.PI / 2;
            shipGroup.add(hull);

            // Wings
            const wingGeometry = new THREE.BoxGeometry(3, 0.1, 0.8);
            const wingMaterial = new THREE.MeshPhongMaterial({
                color: 0x0088cc,
                emissive: 0x002244
            });
            const wings = new THREE.Mesh(wingGeometry, wingMaterial);
            wings.position.z = 0.5;
            shipGroup.add(wings);

            // Engine glow
            const engineGeometry = new THREE.SphereGeometry(0.3, 16, 16);
            const engineMaterial = new THREE.MeshBasicMaterial({
                color: 0x00ffff,
                transparent: true,
                opacity: 0.8
            });
            const engine = new THREE.Mesh(engineGeometry, engineMaterial);
            engine.position.z = 1;
            shipGroup.add(engine);

            player = shipGroup;
            player.position.z = -50;
            playerVelocity = new THREE.Vector3();
            scene.add(player);
        }

        function createAsteroid() {
            const size = Math.random() * 3 + 1;
            const geometry = new THREE.IcosahedronGeometry(size, 0);

            // Deform vertices for irregular shape
            const positions = geometry.attributes.position;
            for (let i = 0; i < positions.count; i++) {
                const x = positions.getX(i);
                const y = positions.getY(i);
                const z = positions.getZ(i);
                const noise = 0.8 + Math.random() * 0.4;
                positions.setXYZ(i, x * noise, y * noise, z * noise);
            }
            geometry.computeVertexNormals();

            const material = new THREE.MeshPhongMaterial({
                color: 0x888888,
                flatShading: true
            });

            const asteroid = new THREE.Mesh(geometry, material);

            // Position ahead of player
            const angle = Math.random() * Math.PI * 2;
            const distance = 200 + Math.random() * 300;
            asteroid.position.x = player.position.x + Math.cos(angle) * 100;
            asteroid.position.y = player.position.y + Math.sin(angle) * 100;
            asteroid.position.z = player.position.z - distance;

            asteroid.userData = {
                velocity: new THREE.Vector3(
                    (Math.random() - 0.5) * 0.5,
                    (Math.random() - 0.5) * 0.5,
                    Math.random() * 0.5 + 0.2
                ),
                rotationSpeed: new THREE.Vector3(
                    Math.random() * 0.02,
                    Math.random() * 0.02,
                    Math.random() * 0.02
                ),
                size: size,
                health: size * 2
            };

            scene.add(asteroid);
            asteroids.push(asteroid);
        }

        function createLaser() {
            const geometry = new THREE.CylinderGeometry(0.05, 0.05, 3, 8);
            const material = new THREE.MeshBasicMaterial({
                color: 0x00ffff,
                transparent: true,
                opacity: 0.9
            });

            const laser = new THREE.Mesh(geometry, material);
            laser.rotation.x = Math.PI / 2;
            laser.position.copy(player.position);
            laser.position.z -= 2;

            // Apply player rotation to laser direction
            const direction = new THREE.Vector3(0, 0, -1);
            direction.applyQuaternion(player.quaternion);

            laser.userData = {
                velocity: direction.multiplyScalar(5),
                life: 100
            };

            // Add glow
            const glowGeometry = new THREE.CylinderGeometry(0.1, 0.1, 3, 8);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: 0x00ffff,
                transparent: true,
                opacity: 0.3
            });
            const glow = new THREE.Mesh(glowGeometry, glowMaterial);
            laser.add(glow);

            scene.add(laser);
            lasers.push(laser);
        }

        function createExplosion(position, size) {
            const particleCount = 30;
            for (let i = 0; i < particleCount; i++) {
                const geometry = new THREE.SphereGeometry(0.1 + Math.random() * 0.2, 8, 8);
                const material = new THREE.MeshBasicMaterial({
                    color: new THREE.Color().setHSL(Math.random() * 0.1 + 0.05, 1, 0.5),
                    transparent: true,
                    opacity: 1
                });

                const particle = new THREE.Mesh(geometry, material);
                particle.position.copy(position);

                const velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * size,
                    (Math.random() - 0.5) * size,
                    (Math.random() - 0.5) * size
                );

                particle.userData = {
                    velocity: velocity,
                    life: 1
                };

                scene.add(particle);
                particles.push(particle);
            }
        }

        function onClick(e) {
            if (!gameStarted) return;
            document.body.requestPointerLock();
        }

        function onMouseMove(e) {
            if (!document.pointerLockElement) return;
            mouseX += e.movementX * 0.002;
            mouseY += e.movementY * 0.002;
            mouseY = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, mouseY));
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            gameStarted = true;
            document.body.requestPointerLock();
        }

        function restartGame() {
            // Clear asteroids
            asteroids.forEach(a => scene.remove(a));
            asteroids = [];

            // Clear lasers
            lasers.forEach(l => scene.remove(l));
            lasers = [];

            // Clear particles
            particles.forEach(p => scene.remove(p));
            particles = [];

            // Reset player
            player.position.set(0, 0, -50);
            playerVelocity.set(0, 0, 0);
            mouseX = 0;
            mouseY = 0;

            // Reset game state
            score = 0;
            health = 100;
            gameOver = false;

            // Update UI
            document.getElementById('score').textContent = score;
            document.getElementById('health-fill').style.width = health + '%';
            document.getElementById('game-over').style.display = 'none';

            document.body.requestPointerLock();
        }

        function updatePlayer() {
            if (gameOver) return;

            // Rotation from mouse
            player.rotation.y = -mouseX;
            player.rotation.x = mouseY;

            // Movement
            const speed = keys['ShiftLeft'] || keys['ShiftRight'] ? 1.5 : 0.8;
            const direction = new THREE.Vector3();

            if (keys['KeyW']) direction.z -= speed;
            if (keys['KeyS']) direction.z += speed * 0.5;
            if (keys['KeyA']) direction.x -= speed * 0.7;
            if (keys['KeyD']) direction.x += speed * 0.7;
            if (keys['Space']) direction.y += speed * 0.7;
            if (keys['ControlLeft']) direction.y -= speed * 0.7;

            direction.applyQuaternion(player.quaternion);
            playerVelocity.add(direction.multiplyScalar(0.1));
            playerVelocity.multiplyScalar(0.95);

            player.position.add(playerVelocity);

            // Camera follows player
            camera.position.copy(player.position);
            camera.position.z += 5;
            camera.position.y += 1;
            camera.lookAt(player.position.x, player.position.y, player.position.z - 10);

            // Shooting
            if (shooting && Date.now() - lastShot > shootCooldown) {
                createLaser();
                lastShot = Date.now();
            }
        }

        function updateAsteroids() {
            // Spawn new asteroids
            if (asteroids.length < 50 && Math.random() < 0.05) {
                createAsteroid();
            }

            for (let i = asteroids.length - 1; i >= 0; i--) {
                const asteroid = asteroids[i];

                // Move
                asteroid.position.add(asteroid.userData.velocity);
                asteroid.rotation.x += asteroid.userData.rotationSpeed.x;
                asteroid.rotation.y += asteroid.userData.rotationSpeed.y;

                // Remove if too far behind
                if (asteroid.position.z > player.position.z + 100) {
                    scene.remove(asteroid);
                    asteroids.splice(i, 1);
                    continue;
                }

                // Collision with player
                const distToPlayer = asteroid.position.distanceTo(player.position);
                if (distToPlayer < asteroid.userData.size + 1) {
                    health -= 20;
                    document.getElementById('health-fill').style.width = Math.max(0, health) + '%';
                    createExplosion(asteroid.position, asteroid.userData.size);
                    scene.remove(asteroid);
                    asteroids.splice(i, 1);

                    if (health <= 0) {
                        endGame();
                    }
                }
            }
        }

        function updateLasers() {
            for (let i = lasers.length - 1; i >= 0; i--) {
                const laser = lasers[i];

                laser.position.add(laser.userData.velocity);
                laser.userData.life--;

                // Remove if expired
                if (laser.userData.life <= 0) {
                    scene.remove(laser);
                    lasers.splice(i, 1);
                    continue;
                }

                // Check collision with asteroids
                for (let j = asteroids.length - 1; j >= 0; j--) {
                    const asteroid = asteroids[j];
                    const dist = laser.position.distanceTo(asteroid.position);

                    if (dist < asteroid.userData.size) {
                        asteroid.userData.health -= 1;

                        if (asteroid.userData.health <= 0) {
                            score += Math.floor(asteroid.userData.size * 100);
                            document.getElementById('score').textContent = score;
                            createExplosion(asteroid.position, asteroid.userData.size * 2);
                            scene.remove(asteroid);
                            asteroids.splice(j, 1);
                        }

                        scene.remove(laser);
                        lasers.splice(i, 1);
                        break;
                    }
                }
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const particle = particles[i];

                particle.position.add(particle.userData.velocity);
                particle.userData.velocity.multiplyScalar(0.95);
                particle.userData.life -= 0.02;
                particle.material.opacity = particle.userData.life;
                particle.scale.multiplyScalar(0.98);

                if (particle.userData.life <= 0) {
                    scene.remove(particle);
                    particles.splice(i, 1);
                }
            }
        }

        function updateMinimap() {
            const canvas = document.getElementById('minimap');
            const ctx = canvas.getContext('2d');
            const size = 150;
            canvas.width = size;
            canvas.height = size;

            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.beginPath();
            ctx.arc(size/2, size/2, size/2, 0, Math.PI * 2);
            ctx.fill();

            // Draw player
            ctx.fillStyle = '#00ffff';
            ctx.beginPath();
            ctx.arc(size/2, size/2, 4, 0, Math.PI * 2);
            ctx.fill();

            // Draw asteroids
            ctx.fillStyle = '#ff4444';
            asteroids.forEach(asteroid => {
                const dx = (asteroid.position.x - player.position.x) / 5;
                const dz = (asteroid.position.z - player.position.z) / 5;
                const x = size/2 + dx;
                const y = size/2 + dz;

                if (x > 0 && x < size && y > 0 && y < size) {
                    ctx.beginPath();
                    ctx.arc(x, y, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function endGame() {
            gameOver = true;
            document.exitPointerLock();
            document.getElementById('final-score').textContent = score;
            document.getElementById('game-over').style.display = 'flex';
        }

        function animate() {
            requestAnimationFrame(animate);

            if (gameStarted && !gameOver) {
                updatePlayer();
                updateAsteroids();
                updateLasers();
                updateParticles();
                updateMinimap();
            }

            renderer.render(scene, camera);
        }

        // Start
        init();
        animate();
    </script>
</body>
</html>
