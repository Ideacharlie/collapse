<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Life</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
        }

        #controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            padding: 20px;
            border-radius: 12px;
            color: #fff;
            min-width: 280px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
            max-height: 90vh;
            overflow-y: auto;
        }

        #controls h1 {
            font-size: 1.5em;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #controls p.subtitle {
            font-size: 0.8em;
            color: #888;
            margin-bottom: 20px;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85em;
            color: #aaa;
        }

        .control-group input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #333;
            outline: none;
            -webkit-appearance: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #48dbfb;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .control-group input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.2s;
        }

        button.primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        button.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        button.secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        #matrix-display {
            margin-top: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }

        #matrix-display h3 {
            font-size: 0.85em;
            color: #888;
            margin-bottom: 10px;
        }

        .matrix-grid {
            display: grid;
            gap: 3px;
            font-size: 0.7em;
        }

        .matrix-cell {
            padding: 4px;
            text-align: center;
            border-radius: 4px;
            font-weight: bold;
        }

        .matrix-header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
        }

        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        #stats {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: #555;
            font-size: 0.8em;
        }

        #instructions {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: #444;
            font-size: 0.8em;
            text-align: right;
        }

        .toggle-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            z-index: 99;
            display: none;
        }

        #controls.hidden {
            display: none;
        }

        #controls.hidden + .toggle-btn {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="controls">
        <h1>Particle Life</h1>
        <p class="subtitle">Emergent behavior from simple rules</p>

        <div class="control-group">
            <label>Particles: <span id="particleCountDisplay">1500</span></label>
            <input type="range" id="particleCount" min="200" max="4000" value="1500">
        </div>

        <div class="control-group">
            <label>Species: <span id="speciesCountDisplay">6</span></label>
            <input type="range" id="speciesCount" min="2" max="8" value="6">
        </div>

        <div class="control-group">
            <label>Interaction Range: <span id="rangeDisplay">150</span></label>
            <input type="range" id="range" min="50" max="300" value="150">
        </div>

        <div class="control-group">
            <label>Force Strength: <span id="forceDisplay">1.0</span></label>
            <input type="range" id="force" min="0.1" max="3" step="0.1" value="1">
        </div>

        <div class="control-group">
            <label>Friction: <span id="frictionDisplay">0.15</span></label>
            <input type="range" id="friction" min="0.01" max="0.5" step="0.01" value="0.15">
        </div>

        <button class="primary" id="randomize">Randomize Rules</button>
        <button class="secondary" id="reset">Reset Positions</button>
        <button class="secondary" id="toggleControls">Hide Controls [H]</button>

        <div id="matrix-display">
            <h3>Attraction Matrix</h3>
            <div id="matrix-grid" class="matrix-grid"></div>
        </div>
    </div>

    <button class="toggle-btn" id="showControls">Show Controls [H]</button>

    <div id="stats">FPS: <span id="fps">60</span></div>
    <div id="instructions">
        Click & drag to attract particles<br>
        Right-click to repel<br>
        Press [H] to toggle controls<br>
        Press [R] to randomize
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let attractionMatrix = [];
        let numSpecies = 6;
        let numParticles = 1500;
        let interactionRange = 150;
        let forceMultiplier = 1;
        let friction = 0.15;

        let mouseX = 0, mouseY = 0;
        let mouseDown = false;
        let rightMouseDown = false;

        // Beautiful color palette
        const colors = [
            '#ff6b6b', // Red
            '#feca57', // Yellow
            '#48dbfb', // Cyan
            '#ff9ff3', // Pink
            '#1dd1a1', // Green
            '#5f27cd', // Purple
            '#ff9f43', // Orange
            '#00d2d3', // Teal
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function generateMatrix() {
            attractionMatrix = [];
            for (let i = 0; i < numSpecies; i++) {
                attractionMatrix[i] = [];
                for (let j = 0; j < numSpecies; j++) {
                    // Random value between -1 and 1
                    attractionMatrix[i][j] = Math.random() * 2 - 1;
                }
            }
            updateMatrixDisplay();
        }

        function updateMatrixDisplay() {
            const grid = document.getElementById('matrix-grid');
            grid.style.gridTemplateColumns = `30px repeat(${numSpecies}, 1fr)`;

            let html = '<div></div>'; // Empty corner

            // Header row
            for (let j = 0; j < numSpecies; j++) {
                html += `<div class="matrix-header"><span class="color-dot" style="background: ${colors[j]}"></span></div>`;
            }

            // Data rows
            for (let i = 0; i < numSpecies; i++) {
                html += `<div class="matrix-header"><span class="color-dot" style="background: ${colors[i]}"></span></div>`;
                for (let j = 0; j < numSpecies; j++) {
                    const val = attractionMatrix[i][j];
                    const hue = val > 0 ? 120 : 0; // Green for positive, red for negative
                    const lightness = 20 + Math.abs(val) * 30;
                    html += `<div class="matrix-cell" style="background: hsla(${hue}, 70%, ${lightness}%, 0.8)">${val.toFixed(1)}</div>`;
                }
            }

            grid.innerHTML = html;
        }

        function createParticles() {
            particles = [];
            for (let i = 0; i < numParticles; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: 0,
                    vy: 0,
                    species: Math.floor(Math.random() * numSpecies)
                });
            }
        }

        function update() {
            // Spatial hashing for performance
            const cellSize = interactionRange;
            const grid = new Map();

            // Populate grid
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                const cellX = Math.floor(p.x / cellSize);
                const cellY = Math.floor(p.y / cellSize);
                const key = `${cellX},${cellY}`;
                if (!grid.has(key)) grid.set(key, []);
                grid.get(key).push(i);
            }

            // Calculate forces
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                let fx = 0, fy = 0;

                const cellX = Math.floor(p.x / cellSize);
                const cellY = Math.floor(p.y / cellSize);

                // Check neighboring cells
                for (let dx = -1; dx <= 1; dx++) {
                    for (let dy = -1; dy <= 1; dy++) {
                        const key = `${cellX + dx},${cellY + dy}`;
                        const cell = grid.get(key);
                        if (!cell) continue;

                        for (const j of cell) {
                            if (i === j) continue;
                            const q = particles[j];

                            let ddx = q.x - p.x;
                            let ddy = q.y - p.y;

                            // Wrap around
                            if (ddx > width / 2) ddx -= width;
                            if (ddx < -width / 2) ddx += width;
                            if (ddy > height / 2) ddy -= height;
                            if (ddy < -height / 2) ddy += height;

                            const dist = Math.sqrt(ddx * ddx + ddy * ddy);

                            if (dist > 0 && dist < interactionRange) {
                                const attraction = attractionMatrix[p.species][q.species];

                                // Force function: repel at very close range, then attraction/repulsion
                                let force;
                                const minDist = 20;

                                if (dist < minDist) {
                                    // Strong repulsion at close range
                                    force = (dist / minDist - 1) * forceMultiplier * 5;
                                } else {
                                    // Attraction/repulsion based on matrix
                                    const normalized = (dist - minDist) / (interactionRange - minDist);
                                    force = attraction * (1 - normalized) * forceMultiplier;
                                }

                                fx += (ddx / dist) * force;
                                fy += (ddy / dist) * force;
                            }
                        }
                    }
                }

                // Mouse interaction
                if (mouseDown || rightMouseDown) {
                    const mdx = mouseX - p.x;
                    const mdy = mouseY - p.y;
                    const mDist = Math.sqrt(mdx * mdx + mdy * mdy);
                    if (mDist < 200 && mDist > 0) {
                        const mForce = (mouseDown ? 3 : -5) * (1 - mDist / 200);
                        fx += (mdx / mDist) * mForce;
                        fy += (mdy / mDist) * mForce;
                    }
                }

                p.vx = (p.vx + fx) * (1 - friction);
                p.vy = (p.vy + fy) * (1 - friction);
            }

            // Update positions
            for (const p of particles) {
                p.x += p.vx;
                p.y += p.vy;

                // Wrap around edges
                if (p.x < 0) p.x += width;
                if (p.x >= width) p.x -= width;
                if (p.y < 0) p.y += height;
                if (p.y >= height) p.y -= height;
            }
        }

        function draw() {
            // Fade effect for trails
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, width, height);

            // Draw particles
            for (const p of particles) {
                const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
                const size = 2 + Math.min(speed * 0.3, 3);

                ctx.beginPath();
                ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
                ctx.fillStyle = colors[p.species];
                ctx.fill();
            }
        }

        // FPS counter
        let lastTime = performance.now();
        let frameCount = 0;

        function updateFPS() {
            frameCount++;
            const now = performance.now();
            if (now - lastTime >= 1000) {
                document.getElementById('fps').textContent = frameCount;
                frameCount = 0;
                lastTime = now;
            }
        }

        function animate() {
            update();
            draw();
            updateFPS();
            requestAnimationFrame(animate);
        }

        // Event Listeners
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 0) mouseDown = true;
            if (e.button === 2) rightMouseDown = true;
        });

        canvas.addEventListener('mouseup', (e) => {
            if (e.button === 0) mouseDown = false;
            if (e.button === 2) rightMouseDown = false;
        });

        canvas.addEventListener('contextmenu', (e) => e.preventDefault());

        canvas.addEventListener('mouseleave', () => {
            mouseDown = false;
            rightMouseDown = false;
        });

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
            mouseDown = true;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', () => {
            mouseDown = false;
        });

        // Controls
        document.getElementById('particleCount').addEventListener('input', (e) => {
            numParticles = parseInt(e.target.value);
            document.getElementById('particleCountDisplay').textContent = numParticles;
        });

        document.getElementById('particleCount').addEventListener('change', () => {
            createParticles();
        });

        document.getElementById('speciesCount').addEventListener('input', (e) => {
            numSpecies = parseInt(e.target.value);
            document.getElementById('speciesCountDisplay').textContent = numSpecies;
        });

        document.getElementById('speciesCount').addEventListener('change', () => {
            generateMatrix();
            createParticles();
        });

        document.getElementById('range').addEventListener('input', (e) => {
            interactionRange = parseInt(e.target.value);
            document.getElementById('rangeDisplay').textContent = interactionRange;
        });

        document.getElementById('force').addEventListener('input', (e) => {
            forceMultiplier = parseFloat(e.target.value);
            document.getElementById('forceDisplay').textContent = forceMultiplier.toFixed(1);
        });

        document.getElementById('friction').addEventListener('input', (e) => {
            friction = parseFloat(e.target.value);
            document.getElementById('frictionDisplay').textContent = friction.toFixed(2);
        });

        document.getElementById('randomize').addEventListener('click', () => {
            generateMatrix();
        });

        document.getElementById('reset').addEventListener('click', () => {
            createParticles();
        });

        function toggleControls() {
            document.getElementById('controls').classList.toggle('hidden');
        }

        document.getElementById('toggleControls').addEventListener('click', toggleControls);
        document.getElementById('showControls').addEventListener('click', toggleControls);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'h' || e.key === 'H') {
                toggleControls();
            }
            if (e.key === 'r' || e.key === 'R') {
                generateMatrix();
            }
        });

        // Initialize
        resize();
        generateMatrix();
        createParticles();
        animate();
    </script>
</body>
</html>
